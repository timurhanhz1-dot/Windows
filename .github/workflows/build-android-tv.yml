name: Build Android TV APK

on:
  workflow_dispatch:

jobs:
  build-android-tv:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Android TV Project
        run: |
          mkdir -p natureco-tv/app/src/main/java/me/natureco/tv
          mkdir -p natureco-tv/app/src/main/res/layout
          mkdir -p natureco-tv/app/src/main/res/values
          mkdir -p natureco-tv/app/src/main/res/drawable
          mkdir -p natureco-tv/app/src/main/res/mipmap-hdpi
          mkdir -p natureco-tv/app/src/main/res/xml

      - name: Create settings.gradle
        run: |
          cat > natureco-tv/settings.gradle << 'EOF'
          rootProject.name = "NatureCo"
          include ':app'
          EOF

      - name: Create root build.gradle
        run: |
          cat > natureco-tv/build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.0'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF

      - name: Create gradle wrapper properties
        run: |
          mkdir -p natureco-tv/gradle/wrapper
          cat > natureco-tv/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Generate Gradle Wrapper
        run: |
          cd natureco-tv
          gradle wrapper --gradle-version 8.4

      - name: Create gradle.properties
        run: |
          cat > natureco-tv/gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

      - name: Create app build.gradle
        run: |
          cat > natureco-tv/app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'me.natureco.tv'
              compileSdk 34
              defaultConfig {
                  applicationId "me.natureco.tv"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      signingConfig signingConfigs.debug
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

      - name: Create AndroidManifest.xml
        run: |
          cat > natureco-tv/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-feature android:name="android.software.leanback" android:required="false" />
              <uses-feature android:name="android.hardware.touchscreen" android:required="false" />
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="Nature.co"
                  android:theme="@style/AppTheme"
                  android:usesCleartextTraffic="false"
                  android:hardwareAccelerated="true"
                  android:largeHeap="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:configChanges="orientation|screenSize|keyboardHidden|keyboard"
                      android:screenOrientation="landscape"
                      android:windowSoftInputMode="stateAlwaysHidden|adjustPan">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                          <category android:name="android.intent.category.LEANBACK_LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Create MainActivity.java
        run: |
          cat > natureco-tv/app/src/main/java/me/natureco/tv/MainActivity.java << 'EOF'
          package me.natureco.tv;
          import android.app.Activity;
          import android.os.Bundle;
          import android.os.Handler;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.webkit.WebChromeClient;
          import android.webkit.JavascriptInterface;
          import android.view.KeyEvent;
          import android.view.Window;
          import android.view.WindowManager;
          import android.view.inputmethod.InputMethodManager;
          import android.content.Context;
          import android.net.ConnectivityManager;
          import android.net.NetworkInfo;

          public class MainActivity extends Activity {
              private WebView webView;
              private Handler handler = new Handler();

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  requestWindowFeature(Window.FEATURE_NO_TITLE);
                  getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN,
                      WindowManager.LayoutParams.FLAG_FULLSCREEN);
                  getWindow().setFlags(WindowManager.LayoutParams.FLAG_HARDWARE_ACCELERATED,
                      WindowManager.LayoutParams.FLAG_HARDWARE_ACCELERATED);

                  webView = new WebView(this);
                  webView.setLayerType(WebView.LAYER_TYPE_HARDWARE, null);
                  setContentView(webView);

                  WebSettings settings = webView.getSettings();
                  // Temel ayarlar
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setDatabaseEnabled(true);
                  settings.setMediaPlaybackRequiresUserGesture(false);

                  // Klavye açılmasın — TV'de harici klavye kullanılsın
                  settings.setNeedInitialFocus(false);

                  // Hız optimizasyonu
                  settings.setCacheMode(WebSettings.LOAD_CACHE_ELSE_NETWORK);
                  settings.setRenderPriority(WebSettings.RenderPriority.HIGH);
                  settings.setEnableSmoothTransition(true);
                  settings.setAllowContentAccess(true);
                  settings.setAllowFileAccess(true);
                  settings.setLoadWithOverviewMode(true);
                  settings.setUseWideViewPort(true);
                  settings.setLayoutAlgorithm(WebSettings.LayoutAlgorithm.NORMAL);

                  // User agent — TV olarak tanıt
                  settings.setUserAgentString("Mozilla/5.0 (Linux; Android 9; TV) AppleWebKit/537.36 Chrome/120.0.0.0 Safari/537.36 NatureCoTV/1.0");

                  // JavaScript bridge — online presence için
                  webView.addJavascriptInterface(new NatureCoInterface(), "AndroidTV");

                  webView.setWebChromeClient(new WebChromeClient());
                  webView.setWebViewClient(new WebViewClient() {
                      @Override
                      public void onPageFinished(WebView view, String url) {
                          super.onPageFinished(view, url);
                          // Klavyeyi kapat
                          hideKeyboard();
                          // Online presence bildir
                          view.evaluateJavascript(
                              "if(window.AndroidTV) { " +
                              "  document.addEventListener('focusin', function(e) {" +
                              "    var t = e.target;" +
                              "    if(t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable) {" +
                              "      window.AndroidTV.hideKeyboard();" +
                              "    }" +
                              "  }, true);" +
                              "  window.dispatchEvent(new Event('androidtv-ready'));" +
                              "}", null);
                          // Periyodik online presence ping
                          startOnlinePing(view);
                      }
                  });

                  webView.loadUrl("https://natureco.me/");
              }

              private void hideKeyboard() {
                  InputMethodManager imm = (InputMethodManager) getSystemService(Context.INPUT_METHOD_SERVICE);
                  if (imm != null && webView != null) {
                      imm.hideSoftInputFromWindow(webView.getWindowToken(), InputMethodManager.HIDE_IMPLICIT_ONLY);
                      imm.hideSoftInputFromWindow(webView.getWindowToken(), 0);
                      getWindow().setSoftInputMode(WindowManager.LayoutParams.SOFT_INPUT_STATE_ALWAYS_HIDDEN);
                  }
              }

              // Her 30 saniyede bir online presence güncelle
              private void startOnlinePing(final WebView view) {
                  handler.removeCallbacksAndMessages(null);
                  Runnable ping = new Runnable() {
                      @Override
                      public void run() {
                          view.evaluateJavascript(
                              "try { " +
                              "  var db = window._firebaseDB || (window.firebase && window.firebase.database && window.firebase.database());" +
                              "  var uid = window._currentUserId;" +
                              "  if(uid && db) { db.ref('online/' + uid).set(true); db.ref('users/' + uid + '/status').set('online'); }" +
                              "} catch(e) {}", null);
                          handler.postDelayed(this, 30000);
                      }
                  };
                  handler.postDelayed(ping, 2000);
              }

              public class NatureCoInterface {
                  @JavascriptInterface
                  public boolean isAndroidTV() { return true; }

                  @JavascriptInterface
                  public void hideKeyboard() { MainActivity.this.hideKeyboard(); }
              }

              @Override
              public boolean onKeyDown(int keyCode, KeyEvent event) {
                  if (keyCode == KeyEvent.KEYCODE_BACK && webView.canGoBack()) {
                      webView.goBack();
                      return true;
                  }
                  return super.onKeyDown(keyCode, event);
              }

              @Override
              protected void onResume() {
                  super.onResume();
                  webView.onResume();
                  webView.resumeTimers();
              }

              @Override
              protected void onPause() {
                  super.onPause();
                  webView.onPause();
                  webView.pauseTimers();
                  handler.removeCallbacksAndMessages(null);
              }

              @Override
              protected void onDestroy() {
                  super.onDestroy();
                  handler.removeCallbacksAndMessages(null);
                  webView.destroy();
              }
          }
          EOF

      - name: Create layout
        run: |
          cat > natureco-tv/app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <WebView xmlns:android="http://schemas.android.com/apk/res/android"
              android:id="@+id/webview"
              android:layout_width="match_parent"
              android:layout_height="match_parent" />
          EOF

      - name: Create styles
        run: |
          cat > natureco-tv/app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="android:Theme.NoTitleBar.Fullscreen">
                  <item name="android:windowBackground">#0B0E11</item>
              </style>
          </resources>
          EOF

      - name: Create launcher icon
        run: |
          mkdir -p natureco-tv/app/src/main/res/mipmap-hdpi
          python3 -c "
          import struct, zlib
          def png(w,h,color):
              def chunk(t,d):
                  c=struct.pack('>I',len(d))+t+d
                  return c+struct.pack('>I',zlib.crc32(c[4:])&0xffffffff)
              raw=b''
              for y in range(h):
                  raw+=b'\x00'
                  for x in range(w):
                      raw+=bytes(color)
              return b'\x89PNG\r\n\x1a\n'+chunk(b'IHDR',struct.pack('>IIBBBBB',w,h,8,2,0,0,0))+chunk(b'IDAT',zlib.compress(raw))+chunk(b'IEND',b'')
              
          with open('natureco-tv/app/src/main/res/mipmap-hdpi/ic_launcher.png','wb') as f:
              f.write(png(72,72,[11,14,17]))
          "

      - name: Build APK
        run: |
          cd natureco-tv
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NatureCo-AndroidTV
          path: natureco-tv/app/build/outputs/apk/**/*.apk
          retention-days: 30
